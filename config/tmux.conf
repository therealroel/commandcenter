# CommandCenter — recommended tmux configuration
# -----------------------------------------------------------------------------
# Gives you mouse scrolling + drag-to-copy inside the web terminals WITHOUT the
# copy-mode trap (where scrolling a full-screen app like Claude swallows your
# keystrokes and shows a `[0/NNN]` indicator until you press `q`).
#
# Install (append to your existing config, or use as-is):
#     cat config/tmux.conf >> ~/.tmux.conf        # append to yours, OR
#     cp  config/tmux.conf  ~/.tmux.conf           # use as your whole config
#     tmux source ~/.tmux.conf                     # reload into running server
#
# Requires: tmux 3.1+ and xclip (for clipboard copy).

set -g mouse on

# Give session names room to breathe (commandcenter uses cc-<project>-<panel>-<agent>)
set -g status-left-length 40

# Drag-to-select copies straight to the system clipboard via xclip
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Wheel handling that NEVER traps you unable to type:
#  - app reading the mouse (mouse_any_flag) OR already in copy-mode -> pass the
#    raw mouse event through (send -M)
#  - full-screen / alternate-screen app (e.g. Claude's TUI) -> pass through too,
#    so scrolling never drops the pane into tmux copy-mode
#  - plain shell output -> copy-mode -e, which auto-exits when you scroll back
#    to the bottom, so you're never stuck unable to type
bind -T root WheelUpPane   if-shell -F "#{?#{||:#{pane_in_mode},#{mouse_any_flag}},1,#{alternate_on}}" { send-keys -M } { copy-mode -e }
bind -T root WheelDownPane if-shell -F "#{?#{||:#{pane_in_mode},#{mouse_any_flag}},1,#{alternate_on}}" { send-keys -M } { copy-mode -e }
